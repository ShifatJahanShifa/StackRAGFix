// ============================= CODE FORMATTING =================
function renderBotResponse(rawText) {
    const container = document.createElement("div");

    // split by code blocks
    const parts = rawText.split(/```([\w-]*)\n([\s\S]*?)```/g);

    for (let i = 0; i < parts.length; i++) {

        // ================= TEXT PART =================
        if (i % 3 === 0) {
            const formatted = formatTextBlocks(parts[i]);
            container.appendChild(formatted);
        }

        // ================= CODE PART =================
        if (i % 3 === 1) {
            // const lang = parts[i] || "code";
            const rawLang = (parts[i] || "").toLowerCase().trim();

            let safeLang = "python";

            if (rawLang.includes("js")) safeLang = "javascript";
            else if (rawLang.includes("ts")) safeLang = "typescript";
            else if (rawLang.includes("py")) safeLang = "python";
            else if (rawLang) safeLang = rawLang;
            // till
            const code = parts[i + 1] || "";

            const codeWrapper = document.createElement("div");
            codeWrapper.className = "code-block";
            codeWrapper.style.margin = "12px 0"; //spacing fix

            const langLabel = document.createElement("div");
            langLabel.className = "code-lang";
            langLabel.innerText = safeLang;

            // const pre = document.createElement("pre");
            // pre.textContent = code.trim();
            const pre = document.createElement("pre");
            const codeEl = document.createElement("code");

            codeEl.className = `language-${safeLang}`;
            codeEl.textContent = code.trim();

            pre.appendChild(codeEl);

            const copyBtn = document.createElement("button");
            copyBtn.className = "copy-btn";
            copyBtn.type = "button";
            copyBtn.textContent = "Copy";

            copyBtn.addEventListener("click", async (e) => {
                e.stopPropagation();

                try {
                    await navigator.clipboard.writeText(code);
                } catch {
                    // fallback
                    const textarea = document.createElement("textarea");
                    textarea.value = code;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand("copy");
                    textarea.remove();
                }

                copyBtn.textContent = "Copied!";
                setTimeout(() => (copyBtn.textContent = "Copy"), 1200);
            });

            codeWrapper.appendChild(copyBtn);
            codeWrapper.appendChild(langLabel);
            codeWrapper.appendChild(pre);

            container.appendChild(codeWrapper);

            i++; 
        }
    }

    return container;
}


function formatTextBlocks(text) {
    const wrapper = document.createElement("div");

    if (!text.trim()) return wrapper;

    // const lines = text.split("\n"); 
    const lines = text.replace(/\r/g, "").split("\n");

    lines.forEach(line => {
        const rawLine = line;
        console.log("LINE DEBUG:", JSON.stringify(rawLine));
        line = line.trim();
        if (!line) return;

        let el;

        if (/^\s*\*\*\*(.+?)\*\*\*\s*$/.test(rawLine)) {
            el = document.createElement("h3");
            el.textContent = rawLine.replace(/^\s*\*\*\*(.+?)\*\*\*\s*$/, "$1");
        }
        else if (/^\s*\*\*(.+?)\*\*\s*$/.test(rawLine)) {
            el = document.createElement("h2");
            el.textContent = rawLine.replace(/^\s*\*\*(.+?)\*\*\s*$/, "$1");
        }
        else if (/^\s*\*([^*].+?)\*\s*$/.test(rawLine)) {
            el = document.createElement("h1");
            el.textContent = rawLine.replace(/^\s*\*([^*].+?)\*\s*$/, "$1");
        }
        else {
            el = document.createElement("div");
            el.appendChild(linkifyText(rawLine));
        }

        el.style.margin = "6px 0"; 
        wrapper.appendChild(el);
    });

    return wrapper;
}

function linkifyText(text) {
    const fragment = document.createDocumentFragment();

    const urlRegex = /(https?:\/\/[^\s)]+)/g;
    let lastIndex = 0;
    let match;

    while ((match = urlRegex.exec(text)) !== null) {
        const url = match[0];

        // text before link
        if (match.index > lastIndex) {
            fragment.appendChild(
                document.createTextNode(text.slice(lastIndex, match.index))
            );
        }

        // link element
        const a = document.createElement("a");
        a.href = url;
        a.textContent = url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.style.color = "#4ea1ff";
        a.style.textDecoration = "underline";

        fragment.appendChild(a);

        lastIndex = match.index + url.length;
    }

    // remaining text
    if (lastIndex < text.length) {
        fragment.appendChild(
            document.createTextNode(text.slice(lastIndex))
        );
    }

    return fragment;
}

            prompt: lastUserPrompt,
            selectedContent: text
        }
    });

    main.scrollTop = main.scrollHeight;
}


function generateLineDiff(text1, text2) {

    const lines1 = text1.split("\n");
    const lines2 = text2.split("\n");

    let html = "";

    const maxLength = Math.max(lines1.length, lines2.length);

    for (let i = 0; i < maxLength; i++) {

        const line1 = lines1[i] || "";
        const line2 = lines2[i] || "";

        if (line1 === line2) {
            html += `<div class="diff-same">${escapeHtml(line1)}</div>`;
        } 
        else {
            if (line1) {
                html += `<div class="diff-removed">- ${escapeHtml(line1)}</div>`;
            }
            if (line2) {
                html += `<div class="diff-added">+ ${escapeHtml(line2)}</div>`;
            }
        }
    }

    return html;
}

function escapeHtml(text) {
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

    if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault(); // stop new line
        sendMessage();
    }
});

// ======================= HANDLER OF SEND MESSAGE INTERACTION ================

function detectLanguageFromPrompt(prompt) {
    const text = prompt.toLowerCase();

    if (/\bpython\b|\bpy\b/.test(text)) return "python";
    if (/\bjavascript\b|\bjs\b/.test(text)) return "javascript";
    if (/\btypescript\b|\bts\b/.test(text)) return "typescript";
    
    return "default"; 
}

function getAndClearSpecialMode(textarea) {
  const mode = textarea.dataset.specialMode || null;

  delete textarea.dataset.specialMode;

  return mode;
}

function sendMessage() {
    const input = document.getElementById("chatInput");
    const modeSelect = document.getElementById("mode");
    const specialMode = getAndClearSpecialMode(input);

    const prompt = input.value.trim();
    lastUserPrompt = prompt;

    if (!prompt) return;
    const landing = document.getElementById("landing");
    if (landing) {
        landing.remove();
    }

    currentView = "chat";

    const mode = modeSelect.value;
    const language = detectLanguageFromPrompt(prompt);

    const main = document.getElementById("mainContent");

    // Show user message
    const userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerText = prompt;
    main.appendChild(userMsg);

    // Spinner
    const botContainer = document.createElement("div");
    botContainer.className = "message bot";

    const spinner = document.createElement("div");
    spinner.className = "spinner";

    botContainer.appendChild(spinner);
    main.appendChild(botContainer);

    conversationHistory.push({
        role: "user",
        content: prompt
    });

    vscode.postMessage({
        type: "chat_request",
        payload: {
            prompt,
            language,
            mode,
            history: conversationHistory,
            selectedFiles: selectedWorkspaceFiles,
            compare: compareEnabled,
            specialMode: specialMode
        }
    });

    input.value = "";
    input.style.height = "50px";
    input.style.overflowY = "hidden";
    input.focus();

    main.scrollTop = main.scrollHeight;
}

window.addEventListener("message", event => {
    const message = event.data;

    if (message.type === "chat_response") {

        const main = document.getElementById("mainContent");

        // Remove spinner
        const lastBot = main.querySelector(".message.bot:last-child");
        if (lastBot) lastBot.remove();

        const botMsg = document.createElement("div");
        botMsg.className = "message bot";
        botMsg.innerHTML = "";
        botMsg.appendChild(renderBotResponse(message.payload.content));
        // botMsg.innerText = message.payload.content;

        main.appendChild(botMsg);
        main.scrollTop = main.scrollHeight;


        conversationHistory.push({
            role: "assistant",
            content: message.payload.content
        });
    }
    

    if (message.type === "chat_compare_response") {

        const main = document.getElementById("mainContent");

        // Remove spinner
        const lastBot = main.querySelector(".message.bot:last-child");
        if (lastBot) lastBot.remove();

        const container = document.createElement("div");
        container.className = "compare-container";

        const stackragText = message.payload.stackrag;
        const copilotText = message.payload.copilot;

        const diffHtml = generateLineDiff(stackragText, copilotText);

        // ===== helper to build compare box =====
        function createCompareBox(title, text, type) {
            const box = document.createElement("div");
            box.className = "compare-box";

            //store raw text safely
            box.dataset.response = text;

            const h4 = document.createElement("h4");
            h4.textContent = title;

            const contentWrapper = document.createElement("div");
            contentWrapper.className = "compare-render";

            contentWrapper.appendChild(renderBotResponse(text));

            const btn = document.createElement("button");
            btn.textContent = "Select";
            btn.onclick = () => selectResponse(type, btn);

            box.appendChild(h4);
            box.appendChild(contentWrapper);
            box.appendChild(btn);

            return box;
        }

        // create boxes
        const stackBox = createCompareBox("StackRAG", stackragText, "stackrag");
        const copilotBox = createCompareBox("Copilot", copilotText, "copilot");

        // ===== diff box =====
        const diffBox = document.createElement("div");
        diffBox.className = "compare-box";

        const diffTitle = document.createElement("h4");
        diffTitle.textContent = "Diff";

        const diffWrapper = document.createElement("div");
        diffWrapper.style.cssText =
            "overflow:auto;font-family:monospace;font-size:12px;background:#111;padding:8px;border-radius:6px;";
        diffWrapper.innerHTML = diffHtml;

        diffBox.appendChild(diffTitle);
        diffBox.appendChild(diffWrapper);

        // append all
        container.appendChild(stackBox);
        container.appendChild(copilotBox);
        container.appendChild(diffBox);

        main.appendChild(container);
    }


    if (message.type === "history_data") {
        fullHistoryCache = message.payload;
        console.log("DEBUG..received: history",fullHistoryCache);
        showDates(fullHistoryCache);

    }

    if (message.type === "workspace_files_response") {
        workspaceFiles = message.payload;

        const fileList = document.getElementById("fileList");
        fileList.innerHTML = "";

        workspaceFiles.forEach(file => {
        const wrapper = document.createElement("div");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.value = file;

        // Restore previous selection
        if (selectedWorkspaceFiles.includes(file)) {
            checkbox.checked = true;
        }

        const label = document.createElement("label");
        label.innerText = file;

        wrapper.appendChild(checkbox);
        wrapper.appendChild(label);

        fileList.appendChild(wrapper);
    });

        document.getElementById("fileContextPopup").style.display = "flex";
    }

    if (message.type === "index_progress") {

        const { current, total } = message.payload;

        const progressText = document.getElementById("progressText");

        if (progressText) {
            progressText.innerText = `${current} / ${total} files`;
        }
    }

    if (message.type === "index_complete") {

        const { timestamp, totalIndexed } = message.payload;

        const content = document.getElementById("indexContent");

        content.innerHTML = `
            <div style="color:#4caf50;">✔ Indexing completed</div>
            <div>${totalIndexed} files indexed</div>
            <div>Last indexed at ${new Date(timestamp).toLocaleString()}</div>
            <button onclick="reindex()">Reindex</button>
        `;
    }

    if (message.type === "initial_index_state") {

        const last = message.payload.lastIndexedTime;

        if (last) {
            document.getElementById("indexContent").innerHTML = `
                <div>Last indexed at ${new Date(last).toLocaleString()}</div>
                <button onclick="reindex()">Reindex</button>
            `;
        }
    }

});

function attachSuggestionHandlers() {
    const suggestions = document.querySelectorAll(".suggestion");

    suggestions.forEach((item) => {
        item.addEventListener("click", () => {
            const text = item.innerText;

            textarea.value = text;
            textarea.style.height = "auto";
            textarea.style.height = textarea.scrollHeight + "px";

            textarea.focus();
        });
    });
}

        div.className = "suggestion";
        div.innerText = date;
        div.onclick = () => showModes(date, history[date]);
        main.appendChild(div);
    });
}

function showModes(date, dayData) {
    currentView = "modes";
    currentDate = date;

    const main = document.getElementById("mainContent");
    main.innerHTML = "";

    addBackButton(() => showDates(fullHistoryCache));

    ["Ask", "Debug", "Refactor"].forEach(mode => {
        if (!dayData[mode] || dayData[mode].length === 0) return;

        // wrapper row
        const row = document.createElement("div");
        row.className = "suggestion";
        row.style.display = "flex";
        row.style.justifyContent = "space-between";
        row.style.alignItems = "center";

        // mode label
        const label = document.createElement("span");
        label.innerText = mode;
        label.style.flex = "1";
        label.style.cursor = "pointer";

        label.onclick = () => openChat(date, mode, dayData[mode]);

        // delete button
        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";
        deleteBtn.className = "delete-btn";
        deleteBtn.style.background = "transparent";
        deleteBtn.style.border = "none";
        deleteBtn.style.cursor = "pointer";
        deleteBtn.style.fontSize = "14px";
        deleteBtn.style.opacity = "0.6";

        deleteBtn.onmouseenter = () => deleteBtn.style.opacity = "1";
        deleteBtn.onmouseleave = () => deleteBtn.style.opacity = "0.6";

        deleteBtn.onclick = (e) => {
            e.stopPropagation();

            vscode.postMessage({
                type: "delete_mode_history",
                payload: {
                    date: date,
                    mode: mode
                }
            });

            // instant UI update
            row.remove();
        };

        row.appendChild(label);
        row.appendChild(deleteBtn);
        main.appendChild(row);
    });
}


function openChat(date, mode, messages) {
    currentView = "chat";
    currentDate = date;
    currentMode = mode;

    document.getElementById("mode").value = mode;

    const main = document.getElementById("mainContent");
    main.innerHTML = "";

    addBackButton(() => showModes(date, fullHistoryCache[date]));

    conversationHistory = [];

    messages.forEach(msg => {

        const user = document.createElement("div");
        user.className = "message user";
        user.innerText = msg.user;

        const bot = document.createElement("div");
        bot.className = "message bot";
        // bot.innerText = msg.assistant;
        bot.innerHTML = "";
        bot.appendChild(renderBotResponse(msg.assistant));

        main.appendChild(user);
        main.appendChild(bot);

        // Rebuild conversationHistory correctly
        conversationHistory.push({
            role: "user",
            content: msg.user
        });

        conversationHistory.push({
            role: "assistant",
            content: msg.assistant
        });
    });

    // scroll to bottom
    main.scrollTop = main.scrollHeight;

    document.getElementById("chatInput").focus();
}




function addBackButton(callback) {
    const main = document.getElementById("mainContent");

    const back = document.createElement("button");
    back.className = "small";
    back.innerText = "← Back";
    back.style.marginBottom = "12px";
    back.onclick = callback;

    main.appendChild(back);
}
